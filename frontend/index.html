<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Intelligence</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Alpine.js Plugins -->
    <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <!-- Alpine.js Core -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen font-sans antialiased selection:bg-brand-500 selection:text-white flex flex-col items-center pt-24 pb-12">

    <!-- Hero Section -->
    <div class="text-center w-full max-w-3xl px-6 mb-10 transition-all duration-700 ease-out translate-y-0 opacity-100">
        <div class="inline-flex items-center justify-center p-3 bg-brand-50 rounded-2xl mb-6 shadow-sm ring-1 ring-brand-500/10">
            <i data-lucide="sparkles" class="w-8 h-8 text-brand-500"></i>
        </div>
        <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight text-gray-900 mb-4">
            Ticket <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-teal-400">Intelligence</span>
        </h1>
        <p class="text-lg text-gray-500 max-w-2xl mx-auto">
            Ask complex questions about your Freshdesk support volume. Powered by AI.
        </p>
    </div>

    <!-- Main App Container -->
    <main 
        x-data="appData()" 
        class="w-full max-w-3xl px-6 flex flex-col gap-6"
    >
        <!-- Search Input Card -->
        <div class="bg-white rounded-2xl shadow-xl shadow-brand-900/5 ring-1 ring-gray-200/50 p-2 transition-all hover:shadow-2xl hover:shadow-brand-900/10 relative z-10">
            <form @submit.prevent="submitQuery" class="flex items-center gap-3 w-full">
                <div class="pl-4 text-gray-400">
                    <i data-lucide="search" class="w-5 h-5"></i>
                </div>
                <input 
                    type="text" 
                    x-model="query"
                    x-ref="searchInput"
                    :disabled="isLoading"
                    placeholder="e.g. How many tickets came in last month? or What are people complaining about?" 
                    class="flex-1 bg-transparent py-4 outline-none text-gray-800 placeholder:text-gray-400 text-lg w-full disabled:opacity-50 transition-opacity"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    :disabled="!query.trim() || isLoading"
                    class="px-6 py-3 bg-brand-500 hover:bg-brand-600 active:bg-brand-700 disabled:bg-gray-200 disabled:text-gray-400 text-white font-semibold rounded-xl transition-all flex items-center gap-2 transform active:scale-95 disabled:hover:scale-100 disabled:active:scale-100 disabled:cursor-not-allowed"
                >
                    <span x-show="!isLoading">Ask AI</span>
                    <span x-show="isLoading" class="flex items-center gap-2">
                        <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                        Thinking...
                    </span>
                </button>
            </form>
        </div>

        <!-- System Status Options (Optional action bar) -->
        <div class="flex justify-end px-2">
             <button @click="triggerIngest" :disabled="isIngesting" class="text-xs font-medium text-gray-400 hover:text-brand-500 transition-colors flex items-center gap-1 disabled:opacity-50">
                 <i data-lucide="database" class="w-3 h-3"></i>
                 <span x-text="isIngesting ? 'Syncing Tickets...' : 'Sync Latest Tickets'"></span>
             </button>
        </div>

        <!-- Response Container -->
        <div 
            x-show="response" 
            x-transition:enter="transition ease-out duration-300 transform"
            x-transition:enter-start="opacity-0 translate-y-4"
            x-transition:enter-end="opacity-100 translate-y-0"
            class="bg-white rounded-2xl shadow-lg ring-1 ring-gray-200/50 p-6 md:p-8 mt-4 overflow-hidden"
            style="display: none;"
        >
            <!-- Header Tag -->
            <div class="flex items-center gap-2 mb-6 border-b border-gray-100 pb-4">
                <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-brand-50 text-brand-600 ring-1 ring-inset ring-brand-500/10">
                    <i data-lucide="bot" class="w-3 h-3 mr-1"></i>
                    AI Analysis 
                </span>
                <span x-show="queryType" class="text-xs text-gray-400 font-mono" x-text="'[' + queryType + ']'"></span>
            </div>
            
            <!-- Markdown Content -->
            <div 
                class="prose prose-brand prose-lg max-w-none prose-headings:font-extrabold prose-headings:tracking-tight prose-a:text-brand-600 hover:prose-a:text-brand-500 prose-pre:bg-gray-900 prose-pre:shadow-lg prose-pre:rounded-xl prose-p:leading-relaxed prose-li:marker:text-brand-500 prose-strong:text-brand-900 prose-strong:font-bold prose-blockquote:border-l-brand-500 prose-blockquote:bg-brand-50 prose-blockquote:py-2 prose-blockquote:px-4 prose-blockquote:rounded-r-lg prose-blockquote:not-italic prose-blockquote:text-gray-700 text-gray-700"
                x-html="formattedResponse"
            ></div>
            
            <!-- Context Toggle (SQL Data) -->
            <div x-show="sqlQuery" class="mt-8 pt-6 border-t border-gray-100">
                <button 
                    @click="showSql = !showSql" 
                    class="text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2"
                >
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200" :class="showSql ? 'rotate-180' : ''"></i>
                    <span x-text="showSql ? 'Hide SQL Query' : 'View Executed SQL'"></span>
                </button>
                <div x-show="showSql" x-collapse class="mt-4">
                    <div class="bg-gray-900 rounded-xl p-4 overflow-x-auto text-sm font-mono text-gray-100 shadow-inner ring-1 ring-white/10">
                        <pre x-text="sqlQuery"></pre>
                    </div>
                </div>
            </div>

            <!-- Context toggle (Raw Data) -->
            <div x-show="rawData && rawData.length > 0" class="mt-4 pt-4 border-t border-gray-100">
                <button 
                    @click="showRaw = !showRaw" 
                    class="text-sm font-medium text-gray-500 hover:text-gray-800 transition-colors flex items-center gap-2"
                >
                    <i data-lucide="chevron-down" class="w-4 h-4 transition-transform duration-200" :class="showRaw ? 'rotate-180' : ''"></i>
                    <span x-text="showRaw ? 'Hide Data Context' : 'View Data Context'"></span>
                </button>
                <div x-show="showRaw" x-collapse class="mt-4">
                    <div class="bg-gray-50 rounded-xl p-4 overflow-x-auto text-xs font-mono text-gray-600 shadow-inner ring-1 ring-gray-900/5">
                        <pre x-text="JSON.stringify(rawData, null, 2)"></pre>
                    </div>
                </div>
            </div>
        </div>
        
    </main>

    <script src="app.js?v=2"></script>
    <script>
        // Initialize lucide icons after page loads
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
